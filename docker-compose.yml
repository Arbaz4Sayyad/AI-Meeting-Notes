services:
  postgres:
    image: postgres:16-alpine
    container_name: meeting-ai-db
    environment:
      POSTGRES_DB: meeting_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: meeting-ai-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/meeting_ai
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-characters-long}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_CREDENTIALS_PATH: ${GCP_CREDENTIALS_PATH:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: meeting-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
