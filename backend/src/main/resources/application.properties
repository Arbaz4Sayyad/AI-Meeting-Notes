# Server
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Database (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/meeting_ai}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File storage (local directory for uploads)
app.upload.dir=${UPLOAD_DIR:uploads}

# Gemini API
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model.summary=gemini-1.5-pro
app.gemini.model.fast=gemini-1.5-pro

# Google Cloud (Speech-to-Text) - use service account JSON path or default credentials
app.google.cloud.project-id=${GCP_PROJECT_ID:}
app.google.cloud.credentials=${GCP_CREDENTIALS_PATH:}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
