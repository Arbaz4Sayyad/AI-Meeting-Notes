<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting AI - Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const [user, setUser] = useState({ name: 'Demo User' });
            const [meetings, setMeetings] = useState([
                {
                    id: 1,
                    title: 'Weekly Team Standup',
                    createdAt: new Date().toISOString(),
                    hasSummary: true,
                    transcript: 'Team discussed progress on the current sprint. John completed the authentication module. Sarah is working on the payment integration. Mike identified a blocker with the database connection that needs to be resolved.'
                },
                {
                    id: 2,
                    title: 'Client Project Review',
                    createdAt: new Date(Date.now() - 86400000).toISOString(),
                    hasSummary: false,
                    transcript: 'Client reviewed the new features and provided feedback on the UI design. They requested additional reporting functionality and agreed to the proposed timeline.'
                }
            ]);

            const Dashboard = () => (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
                    <nav className="bg-white border-b border-slate-200 px-4 py-3">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-slate-800">Meeting AI</h1>
                            <div className="flex items-center gap-4">
                                <span className="text-slate-600 text-sm">{user.name}</span>
                                <button className="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700">
                                    Upload Meeting
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6">
                        <h1 className="text-3xl font-bold text-slate-800 mb-6">Dashboard</h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                                <h3 className="text-slate-500 text-sm font-medium">Total Meetings</h3>
                                <p className="text-3xl font-bold text-slate-800 mt-1">{meetings.length}</p>
                            </div>
                            <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                                <h3 className="text-slate-500 text-sm font-medium">Pending Action Items</h3>
                                <p className="text-3xl font-bold text-teal-600 mt-1">12</p>
                            </div>
                        </div>

                        <section className="mb-8">
                            <h2 className="text-lg font-semibold text-slate-800 mb-4">Recent Meetings</h2>
                            <div className="space-y-2">
                                {meetings.map(meeting => (
                                    <div key={meeting.id} className="bg-white rounded-lg p-4 shadow-sm border border-slate-100 hover:border-teal-200 transition cursor-pointer">
                                        <div className="flex justify-between">
                                            <span className="font-medium text-slate-800">{meeting.title}</span>
                                            {meeting.hasSummary && (
                                                <span className="text-xs bg-teal-100 text-teal-700 px-2 py-1 rounded">Summary</span>
                                            )}
                                        </div>
                                        <span className="text-sm text-slate-500">
                                            {new Date(meeting.createdAt).toLocaleDateString()}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );

            const MeetingDetail = ({ meeting }) => (
                <div className="min-h-screen bg-slate-50">
                    <nav className="bg-white border-b border-slate-200 px-4 py-3">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-slate-800">Meeting AI</h1>
                            <span className="text-slate-600 text-sm">{user.name}</span>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-6">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800">{meeting.title}</h1>
                                <p className="text-slate-500 text-sm">{new Date(meeting.createdAt).toLocaleString()}</p>
                            </div>
                            <div className="flex gap-2">
                                <button className="px-4 py-2 border border-slate-200 rounded-lg text-sm hover:bg-slate-50">
                                    Save transcript
                                </button>
                                <button className="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">
                                    Generate summary
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                            <h2 className="text-lg font-semibold text-slate-800 mb-3">Transcript</h2>
                            <textarea
                                className="w-full h-64 px-4 py-3 rounded-lg border border-slate-200 text-slate-800 resize-y"
                                value={meeting.transcript}
                                readOnly
                            />
                        </div>

                        {meeting.hasSummary && (
                            <div className="mt-6 bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                                <h2 className="text-2xl font-bold text-slate-800 mb-4">AI-Generated Summary</h2>
                                
                                <div className="mb-6 p-4 bg-gradient-to-r from-teal-50 to-blue-50 rounded-lg border border-teal-200">
                                    <h3 className="text-lg font-semibold text-slate-800 mb-2">Executive Summary</h3>
                                    <p className="text-slate-700">
                                        The team reviewed current sprint progress with John completing authentication and Sarah working on payment integration. 
                                        A database connection blocker was identified and needs immediate attention. Client feedback was positive with additional reporting features requested.
                                    </p>
                                </div>

                                <div className="mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 mb-4 flex items-center">
                                        📋 Action Items
                                        <span className="ml-2 text-sm bg-teal-100 text-teal-700 px-2 py-1 rounded-full">3</span>
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="border border-slate-200 rounded-lg p-4">
                                            <div className="flex items-center gap-2 mb-2">
                                                <h4 className="font-medium text-slate-800">Resolve database connection issue</h4>
                                                <span className="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full">High</span>
                                            </div>
                                            <div className="flex items-center gap-4 text-sm text-slate-600">
                                                <div className="flex items-center gap-1">👤 Mike</div>
                                                <div className="flex items-center gap-1">📅 Today</div>
                                            </div>
                                        </div>
                                        <div className="border border-slate-200 rounded-lg p-4">
                                            <div className="flex items-center gap-2 mb-2">
                                                <h4 className="font-medium text-slate-800">Complete payment integration testing</h4>
                                                <span className="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-full">Medium</span>
                                            </div>
                                            <div className="flex items-center gap-4 text-sm text-slate-600">
                                                <div className="flex items-center gap-1">👤 Sarah</div>
                                                <div className="flex items-center gap-1">📅 This week</div>
                                            </div>
                                        </div>
                                        <div className="border border-slate-200 rounded-lg p-4">
                                            <div className="flex items-center gap-2 mb-2">
                                                <h4 className="font-medium text-slate-800">Add reporting functionality</h4>
                                                <span className="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-full">Medium</span>
                                            </div>
                                            <div className="flex items-center gap-4 text-sm text-slate-600">
                                                <div className="flex items-center gap-1">👤 John</div>
                                                <div className="flex items-center gap-1">📅 Next sprint</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <h3 className="text-xl font-semibold text-slate-800 mb-4">👥 Participants</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                        <div className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                            <div className="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center">👤</div>
                                            <div>
                                                <p className="font-medium text-slate-800">John</p>
                                                <p className="text-xs text-slate-500">Developer</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                            <div className="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center">👤</div>
                                            <div>
                                                <p className="font-medium text-slate-800">Sarah</p>
                                                <p className="text-xs text-slate-500">Developer</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-200">
                                            <div className="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center">👤</div>
                                            <div>
                                                <p className="font-medium text-slate-800">Mike</p>
                                                <p className="text-xs text-slate-500">Team Lead</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );

            const Analytics = () => (
                <div className="min-h-screen bg-slate-50">
                    <nav className="bg-white border-b border-slate-200 px-4 py-3">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold text-slate-800">Meeting AI</h1>
                            <span className="text-slate-600 text-sm">{user.name}</span>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6">
                        <div className="mb-8">
                            <h1 className="text-3xl font-bold text-slate-800">Analytics Dashboard</h1>
                            <p className="text-slate-600 mt-2">Track your meeting productivity and insights</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <div className="p-6 rounded-xl border bg-teal-50 text-teal-700 border-teal-200">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium opacity-80">Total Meetings</p>
                                        <p className="text-3xl font-bold mt-1">{meetings.length}</p>
                                        <p className={`text-sm mt-2 text-green-600`}>↑ 12% from last period</p>
                                    </div>
                                    <div className="w-12 h-12 bg-white bg-opacity-50 rounded-full flex items-center justify-center">📅</div>
                                </div>
                            </div>
                            <div className="p-6 rounded-xl border bg-blue-50 text-blue-700 border-blue-200">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium opacity-80">Action Items</p>
                                        <p className="text-3xl font-bold mt-1">12</p>
                                        <p className={`text-sm mt-2 text-red-600`}>↓ 5% from last period</p>
                                    </div>
                                    <div className="w-12 h-12 bg-white bg-opacity-50 rounded-full flex items-center justify-center">📋</div>
                                </div>
                            </div>
                            <div className="p-6 rounded-xl border bg-green-50 text-green-700 border-green-200">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium opacity-80">Avg Duration</p>
                                        <p className="text-3xl font-bold mt-1">45m</p>
                                        <p className={`text-sm mt-2 text-green-600`}>↑ 8% from last period</p>
                                    </div>
                                    <div className="w-12 h-12 bg-white bg-opacity-50 rounded-full flex items-center justify-center">⏱️</div>
                                </div>
                            </div>
                            <div className="p-6 rounded-xl border bg-purple-50 text-purple-700 border-purple-200">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium opacity-80">Productivity Score</p>
                                        <p className="text-3xl font-bold mt-1">85%</p>
                                        <p className={`text-sm mt-2 text-green-600`}>↑ 15% from last period</p>
                                    </div>
                                    <div className="w-12 h-12 bg-white bg-opacity-50 rounded-full flex items-center justify-center">⚡</div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                                <h3 className="text-lg font-semibold text-slate-800 mb-4">Meeting Trends</h3>
                                <div className="h-64 flex items-center justify-center bg-slate-50 rounded-lg">
                                    <div className="text-center text-slate-500">
                                        <div className="text-4xl mb-2">📊</div>
                                        <p>Chart visualization</p>
                                        <p className="text-sm">Integration with Chart.js</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
                                <h3 className="text-lg font-semibold text-slate-800 mb-4">Action Item Status</h3>
                                <div className="space-y-4">
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-slate-600">Completed</span>
                                            <span className="font-medium">75%</span>
                                        </div>
                                        <div className="w-full bg-slate-200 rounded-full h-2">
                                            <div className="bg-green-500 h-2 rounded-full" style={{ width: '75%' }}></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-slate-600">In Progress</span>
                                            <span className="font-medium">20%</span>
                                        </div>
                                        <div className="w-full bg-slate-200 rounded-full h-2">
                                            <div className="bg-yellow-500 h-2 rounded-full" style={{ width: '20%' }}></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-slate-600">Overdue</span>
                                            <span className="font-medium">5%</span>
                                        </div>
                                        <div className="w-full bg-slate-200 rounded-full h-2">
                                            <div className="bg-red-500 h-2 rounded-full" style={{ width: '5%' }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );

            return (
                <div>
                    {currentView === 'dashboard' && <Dashboard />}
                    {currentView === 'meeting1' && <MeetingDetail meeting={meetings[0]} />}
                    {currentView === 'meeting2' && <MeetingDetail meeting={meetings[1]} />}
                    {currentView === 'analytics' && <Analytics />}
                    
                    <div className="fixed bottom-4 right-4 bg-white rounded-lg shadow-lg border border-slate-200 p-2">
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setCurrentView('dashboard')}
                                className={`px-3 py-1 rounded text-sm ${currentView === 'dashboard' ? 'bg-teal-100 text-teal-700' : 'text-slate-600'}`}
                            >
                                Dashboard
                            </button>
                            <button 
                                onClick={() => setCurrentView('meeting1')}
                                className={`px-3 py-1 rounded text-sm ${currentView === 'meeting1' ? 'bg-teal-100 text-teal-700' : 'text-slate-600'}`}
                            >
                                Meeting 1
                            </button>
                            <button 
                                onClick={() => setCurrentView('meeting2')}
                                className={`px-3 py-1 rounded text-sm ${currentView === 'meeting2' ? 'bg-teal-100 text-teal-700' : 'text-slate-600'}`}
                            >
                                Meeting 2
                            </button>
                            <button 
                                onClick={() => setCurrentView('analytics')}
                                className={`px-3 py-1 rounded text-sm ${currentView === 'analytics' ? 'bg-teal-100 text-teal-700' : 'text-slate-600'}`}
                            >
                                Analytics
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
